name: Cypress Tests

on: [push, pull_request]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.env.js
        shell: bash
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          INVALID_USER_EMAIL: ${{ secrets.INVALID_USER_EMAIL }}
          INVALID_USER_PASSWORD: ${{ secrets.INVALID_USER_PASSWORD }}
        run: |
          node -e "
            const secrets = {
              userEmail: process.env.USER_EMAIL,
              userPassword: process.env.USER_PASSWORD,
              invalidUserEmail: process.env.INVALID_USER_EMAIL,
              invalidUserPassword: process.env.INVALID_USER_PASSWORD
            };
            const content = 'const secrets = ' + JSON.stringify(secrets, null, 4) + ';\n\nexport default secrets;';
            require('fs').writeFileSync('secrets.env.js', content);
          "

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          # We installed cypress locally, so we can use the local install
          install: true
          # Start command is not needed if you don't have a dev server dependency
          # If your app needs to be running, add 'start: npm run dev' here
